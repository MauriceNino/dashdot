name: Deploy

on:
  push:
    branches: ["main", "dev", "feat/**", "fix/**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ghcr.io/keestucker/dashdot
          labels: |
            org.opencontainers.image.title="dash."
            org.opencontainers.image.description="dash. - a modern server dashboard"
            org.opencontainers.image.authors="KeesTucker"
            org.opencontainers.image.url=https://github.com/KeesTucker/dashdot
            org.opencontainers.image.source=https://github.com/KeesTucker/dashdot
            org.opencontainers.image.licenses=MIT
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=ref,event=branch,enable=${{ github.ref_name != 'main' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          target: prod
          push: true
          build-args: |
            VERSION=0.0.0-${{ github.ref_name }}
            BUILDHASH=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_nvidia:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta_nvidia
        with:
          flavor: |
            latest=false
          images: |
            ghcr.io/keestucker/dashdot
          labels: |
            org.opencontainers.image.title="dash."
            org.opencontainers.image.description="dash. - a modern server dashboard"
            org.opencontainers.image.authors="KeesTucker"
            org.opencontainers.image.url=https://github.com/KeesTucker/dashdot
            org.opencontainers.image.source=https://github.com/KeesTucker/dashdot
            org.opencontainers.image.licenses=MIT
          tags: |
            type=raw,value=nvidia,enable=${{ github.ref_name == 'main' }}
            type=ref,event=branch,enable=${{ github.ref_name != 'main' }},prefix=nvidia-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.nvidia
          platforms: linux/amd64,linux/arm64/v8
          target: prod
          push: true
          build-args: |
            VERSION=0.0.0-${{ github.ref_name }}
            BUILDHASH=${{ github.sha }}
          labels: ${{ steps.meta_nvidia.outputs.labels }}
          tags: ${{ steps.meta_nvidia.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_arc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta_arc
        with:
          flavor: |
            latest=false
          images: |
            ghcr.io/keestucker/dashdot
          labels: |
            org.opencontainers.image.title="dash."
            org.opencontainers.image.description="dash. - a modern server dashboard"
            org.opencontainers.image.authors="KeesTucker"
            org.opencontainers.image.url=https://github.com/KeesTucker/dashdot
            org.opencontainers.image.source=https://github.com/KeesTucker/dashdot
            org.opencontainers.image.licenses=MIT
          tags: |
            type=raw,value=arc,enable=${{ github.ref_name == 'main' }}
            type=ref,event=branch,enable=${{ github.ref_name != 'main' }},prefix=arc-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.arc
          platforms: linux/amd64
          target: prod
          push: true
          build-args: |
            VERSION=0.0.0-${{ github.ref_name }}
            BUILDHASH=${{ github.sha }}
          labels: ${{ steps.meta_arc.outputs.labels }}
          tags: ${{ steps.meta_arc.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
